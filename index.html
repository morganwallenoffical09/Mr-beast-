<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The $1M Stake | Creator Portal</title>
    <style>
        :root {
            --gold: #D4AF37;
            --bg: #0A0A0A;
            --card: #161616;
            --text: #FFFFFF;
            --accent: #2ecc71;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .portal-card {
            background: var(--card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: var(--gold);
        }

        .status-badge {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        h1 { font-size: 1.2rem; margin: 20px 0; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label { font-size: 0.7rem; color: #555; text-transform: uppercase; }

        input {
            width: 100%;
            background: #222;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 6px;
            color: white;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .btn {
            background: var(--gold);
            color: black;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 6px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
            text-transform: uppercase;
        }

        .btn:hover { transform: scale(1.02); background: #f1c40f; }

        .secure-lock {
            font-size: 0.7rem;
            color: #444;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <div class="portal-card">
        <div class="status-badge">Private Invitation Only</div>
        <div class="logo">$1,000,000 STAKE</div>
        
        <h1>Participant Onboarding</h1>
        <p>Please enter your unique creator ID and secure the commitment bond to proceed.</p>

        <form id="payment-form">
            <div class="input-group">
                <label>Channel Name / Creator ID</label>
                <input type="text" placeholder="e.g. MrBeast_Guest_04" required>
            </div>
            
            <div class="input-group">
                <label>Commitment Bond (USD)</label>
                <input type="text" value="$2,500.00" readonly>
            </div>

            <button type="submit" class="btn">Secure My Slot</button>
        </form>

        <div class="secure-lock">
            <span>🔒</span> 256-BIT END-TO-END ENCRYPTED PRODUCTION PORTAL
        </div>
    </div>

    <script>
        document.getElementById('payment-form').onsubmit = function(e) {
            e.preventDefault();
            alert("Redirecting to Secure Payment Gateway... \n\nPlease complete the $2,500 Bond to unlock the NDA and Flight Briefing.");
            // Link your payment processor here (Stripe, PayPal, etc.)
        }
    </script>

</body>
</html>
